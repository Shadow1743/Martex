<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Admin | Martex</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#1B2A4A', dark: '#0F1A30' },
            teal: { DEFAULT: '#2A9D8F', hover: '#228176' },
            panther: { DEFAULT: '#121212', card: '#1A1A1A' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-md bg-slate-900/90 backdrop-blur-xl border border-slate-800 rounded-2xl p-8 shadow-2xl">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 font-display text-2xl font-bold text-white mb-2">
        <svg class="w-7 h-7 text-emerald-500 stroke-[1.8]" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.38 3.46 16 2a4 4 0 0 0-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23Z"/></svg>
        <span>Mar<span class="text-emerald-500">tex</span></span>
      </div>
      <p class="text-xs text-slate-400">Sistema Interno de Administración</p>
    </div>

    <div id="login-error" class="hidden mb-4 p-3 rounded-lg bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs text-center font-medium"></div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-300 mb-1">Correo Electrónico</label>
        <input type="email" id="email" required placeholder="admin@martex.com" class="w-full px-4 py-2.5 rounded-xl bg-slate-800/60 border border-slate-700 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500">
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-300 mb-1">Contraseña</label>
        <input type="password" id="password" required placeholder="••••••••" class="w-full px-4 py-2.5 rounded-xl bg-slate-800/60 border border-slate-700 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500">
      </div>

      <button type="submit" id="login-btn" class="w-full py-3 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white font-semibold text-xs transition-colors shadow-lg shadow-emerald-600/20">
        Acceder al Panel
      </button>
    </form>

    <div class="mt-6 text-center">
      <a href="../frontend/index.html" class="text-xs text-slate-500 hover:text-slate-300 transition-colors">Volver a la tienda pública</a>
    </div>
  </div>

  <script src="js/admin-app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = 'Verificando...';

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Error de autenticación');
        }

        sessionStorage.setItem('martex-admin-token', data.token);
        sessionStorage.setItem('martex-admin-user', JSON.stringify(data.user));

        window.location.href = 'admin.html';
      } catch (error) {
        errorEl.textContent = error.message;
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = 'Acceder al Panel';
      }
    });
  </script>
</body>
</html>

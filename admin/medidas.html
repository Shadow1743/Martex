<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Medidas | Martex Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#1B2A4A', dark: '#0F1A30' },
            teal: { DEFAULT: '#2A9D8F', hover: '#228176' },
            panther: { DEFAULT: '#121212', card: '#1A1A1A' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="bg-slate-50 dark:bg-[#121212] text-slate-900 dark:text-slate-100 transition-colors duration-300">
  <div class="admin-layout">

    <!-- ═══ SIDEBAR ═══ -->
    <aside id="sidebar" class="sidebar-admin bg-slate-900 text-slate-300 border-r border-slate-800">
      <div class="p-6 border-b border-slate-800 flex items-center justify-between">
        <a href="dashboard.html" class="flex items-center gap-2 font-display text-xl font-bold text-white">
          <svg class="w-6 h-6 text-emerald-500 stroke-[1.8]" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.38 3.46 16 2a4 4 0 0 0-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23Z"/></svg>
          <span>Martex Admin</span>
        </a>
      </div>

      <nav class="flex-1 p-4 space-y-1">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-semibold text-slate-400 hover:text-white hover:bg-slate-800/60 transition-colors">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="productos.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-semibold text-slate-400 hover:text-white hover:bg-slate-800/60 transition-colors">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 12v10"/></svg>
          <span>Productos</span>
        </a>
        <a href="pedidos.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-semibold text-slate-400 hover:text-white hover:bg-slate-800/60 transition-colors">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 11-1 9"/><path d="m19 11-4-7"/><path d="M2 11h20"/><path d="m3.5 11 1.6 7.4a2 2 0 0 0 2 1.6h9.8a2 2 0 0 0 2-1.6l1.6-7.4"/><path d="m4.5 11 4-7"/><path d="m9 11 1 9"/></svg>
          <span>Pedidos</span>
        </a>
        <a href="medidas.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-semibold text-white bg-emerald-600/15 border border-emerald-500/20 text-emerald-400">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.4 2.4 0 0 1 0-3.4l2.6-2.6a2.4 2.4 0 0 1 3.4 0l12.6 12.6z"/></svg>
          <span>Registro Medidas</span>
        </a>
      </nav>

      <div class="p-4 border-t border-slate-800">
        <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-semibold text-slate-400 hover:text-rose-400 hover:bg-rose-500/10 transition-colors">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Cerrar Sesión</span>
        </button>
      </div>
    </aside>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="main-admin flex-1">
      <div class="h-20 bg-white dark:bg-[#1A1A1A] border-b border-slate-200 dark:border-slate-800 px-8 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-4">
          <button id="sidebar-toggle" class="md:hidden p-2 text-slate-500 hover:text-slate-900 dark:hover:text-white">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="text-xl font-bold font-display text-slate-900 dark:text-white">Registro de Medidas de Sastrería</h1>
        </div>

        <div class="flex items-center gap-4">
          <button id="admin-theme-toggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" aria-label="Cambiar tema"></button>
          <div class="text-xs font-semibold text-slate-700 dark:text-slate-300" id="admin-user-name">Administrador</div>
        </div>
      </div>

      <div class="p-8 space-y-8">
        <!-- Formulario Especializado -->
        <div class="bg-white dark:bg-[#1A1A1A] rounded-2xl border border-slate-200 dark:border-slate-800 p-6 shadow-sm">
          <h3 class="text-sm font-bold text-slate-900 dark:text-white uppercase tracking-wider mb-6 pb-3 border-b border-slate-100 dark:border-slate-800">
            Ficha de Toma de Medidas
          </h3>

          <form id="medida-form" class="space-y-6">
            <div class="grid sm:grid-cols-3 gap-4">
              <div>
                <label class="block text-xs font-semibold text-slate-700 dark:text-slate-300 mb-1">Nombre Completo del Cliente *</label>
                <input type="text" id="medida-nombre" required placeholder="Ej. Dra. María Fernández" class="w-full px-3.5 py-2 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
              </div>

              <div>
                <label class="block text-xs font-semibold text-slate-700 dark:text-slate-300 mb-1">Teléfono</label>
                <input type="text" id="medida-telefono" placeholder="0000-0000" class="w-full px-3.5 py-2 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
              </div>

              <div>
                <label class="block text-xs font-semibold text-slate-700 dark:text-slate-300 mb-1">Tipo de Prenda *</label>
                <select id="medida-tipo" required class="w-full px-3.5 py-2 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                  <option value="">— Seleccionar prenda —</option>
                  <option value="filipina">Solo Filipina / Gabacha</option>
                  <option value="pantalon">Solo Pantalón</option>
                  <option value="ambos">Ambos (Filipina + Pantalón)</option>
                </select>
              </div>
            </div>

            <!-- Campos Condicionales Filipina / Gabacha -->
            <div id="filipina-fields-section" class="p-5 rounded-xl bg-slate-50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-800 space-y-4 hidden">
              <h4 class="text-xs font-bold uppercase tracking-wider text-emerald-600 dark:text-emerald-400">
                Parámetros Filipina / Gabacha
              </h4>
              <div class="grid sm:grid-cols-4 gap-4">
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Hombro (cm)</label>
                  <input type="number" id="m-hombro" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Busto (cm)</label>
                  <input type="number" id="m-busto" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Cintura Top (cm)</label>
                  <input type="number" id="m-cintura-top" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Cadera Top (cm)</label>
                  <input type="number" id="m-cadera-top" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Largo Cintura (cm)</label>
                  <input type="number" id="m-largo-cintura" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Largo Manga (cm)</label>
                  <input type="number" id="m-manga-largo" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Grosor Brazo (cm)</label>
                  <input type="number" id="m-grosor-brazo" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Largo Total Top (cm)</label>
                  <input type="number" id="m-largo-total-top" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
              </div>
            </div>

            <!-- Campos Condicionales Pantalón -->
            <div id="pantalon-fields-section" class="p-5 rounded-xl bg-slate-50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-800 space-y-4 hidden">
              <h4 class="text-xs font-bold uppercase tracking-wider text-emerald-600 dark:text-emerald-400">
                Parámetros Pantalón
              </h4>
              <div class="grid sm:grid-cols-4 gap-4">
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Cintura Pantalón (cm)</label>
                  <input type="number" id="m-cintura-pant" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Cadera Pantalón (cm)</label>
                  <input type="number" id="m-cadera-pant" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Largo Rodilla (cm)</label>
                  <input type="number" id="m-largo-rodilla" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Largo Total Pantalón (cm)</label>
                  <input type="number" id="m-largo-total-pant" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Grosor Muslo (cm)</label>
                  <input type="number" id="m-grosor-muslo" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Tiro (cm)</label>
                  <input type="number" id="m-tiro" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                  <label class="block text-[11px] font-medium text-slate-600 dark:text-slate-400 mb-1">Grosor Rodilla (cm)</label>
                  <input type="number" id="m-grosor-rodilla" step="0.1" placeholder="0.0" class="w-full px-3 py-1.5 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500">
                </div>
              </div>
            </div>

            <div>
              <label class="block text-xs font-semibold text-slate-700 dark:text-slate-300 mb-1">Notas de Sastrería & Preferencias</label>
              <textarea id="medida-notas" rows="2" placeholder="Ajustes de holgura, tipos de pinza, aperturas laterales, etc." class="w-full px-3.5 py-2 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500"></textarea>
            </div>

            <button type="submit" class="inline-flex items-center gap-2 px-6 py-2.5 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-semibold transition-colors shadow-lg shadow-emerald-600/20">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              <span>Guardar Registro de Medidas</span>
            </button>
          </form>
        </div>

        <!-- Tabla Historial Medidas -->
        <div class="bg-white dark:bg-[#1A1A1A] rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
          <div class="p-6 border-b border-slate-100 dark:border-slate-800">
            <h3 class="text-sm font-bold text-slate-900 dark:text-white uppercase tracking-wider">Historial de Fichas de Sastrería</h3>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="bg-slate-50 dark:bg-slate-900/50 text-[10px] uppercase tracking-wider font-bold text-slate-400 border-b border-slate-100 dark:border-slate-800">
                  <th class="py-3 px-4">Cliente</th>
                  <th class="py-3 px-4">Teléfono</th>
                  <th class="py-3 px-4">Prenda</th>
                  <th class="py-3 px-4">Parámetros de Medida</th>
                  <th class="py-3 px-4">Notas</th>
                  <th class="py-3 px-4">Fecha</th>
                  <th class="py-3 px-4">Acción</th>
                </tr>
              </thead>
              <tbody id="medidas-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/admin-app.js"></script>
  <script src="js/medidas.js"></script>
</body>
</html>
